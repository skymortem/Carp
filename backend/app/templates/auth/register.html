{% extends "base.html" %}
{% block title %}Регистрация — Carp{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-20">
    <h2 class="text-2xl font-bold mb-6">Регистрация</h2>
    <form x-data="{ email: '', username: '', password: '', errmsg: '' }" @submit.prevent="
        fetch('/auth/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email, username, password})})
        .then(r=>r.json()).then(d=>{ if(d.ok) { document.cookie='access_token='+d.token+';path=/'; window.location='/dashboard'; } else { errmsg=d.detail; }})
    ">
        <div class="mb-4">
            <label class="block text-sm text-slate-400 mb-1">Имя</label>
            <input type="text" x-model="username" class="input" required>
        </div>
        <div class="mb-4">
            <label class="block text-sm text-slate-400 mb-1">Email</label>
            <input type="email" x-model="email" class="input" required>
        </div>
        <div class="mb-4">
            <label class="block text-sm text-slate-400 mb-1">Пароль</label>
            <input type="password" x-model="password" class="input" required minlength="6">
        </div>
        <button type="submit" class="btn-primary w-full">Зарегистрироваться</button>
        <div class="mt-3 text-sm text-red-400" x-text="errmsg"></div>
    </form>
    <p class="mt-4 text-sm text-slate-500">
        Уже есть аккаунт? <a href="/login" class="text-blue-400">Войти</a>
    </p>
</div>
{% endblock %}
